# ===========================================
# UNISTYLES E-COMMERCE - Docker Compose
# Full Stack: React + Node.js + Directus + PostgreSQL + Redis
#
# Deployed via Coolify (Traefik handles routing + SSL).
# Per-service public domains are configured in the Coolify UI;
# this file does not bind host ports for services Coolify exposes.
# ===========================================

services:
  # ===========================================
  # FRONTEND - React App (Vite + Nginx)
  # Coolify domain: unistylescuracao.com
  # ===========================================
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      args:
        # Public URLs of the sibling services. Vite bakes these in at build
        # time, so changing them requires a frontend rebuild.
        - VITE_API_URL=${FRONTEND_VITE_API_URL:-https://api.unistylescuracao.com}
        - VITE_DIRECTUS_URL=${FRONTEND_VITE_DIRECTUS_URL:-https://cms.unistylescuracao.com}
        - VITE_USE_CMS=${FRONTEND_VITE_USE_CMS:-true}
        - BUILDKIT_INLINE_CACHE=1
    container_name: unistyles-frontend
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
      directus:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - unistyles-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ===========================================
  # BACKEND - Node.js API Server
  # Coolify domain: api.unistylescuracao.com
  # ===========================================
  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: unistyles-backend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://unistyles:${DB_PASSWORD}@postgres:5432/unistyles_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=${FRONTEND_URL:-https://unistylescuracao.com}
      - DIRECTUS_URL=${DIRECTUS_URL:-https://cms.unistylescuracao.com}
      - SITE_URL=${SITE_URL:-https://unistylescuracao.com}
      - WHATSAPP_NUMBER=${WHATSAPP_NUMBER}
      - SENTOO_API_KEY=${SENTOO_API_KEY}
      - SENTOO_MERCHANT_ID=${SENTOO_MERCHANT_ID}
      - SENTOO_SANDBOX=${SENTOO_SANDBOX:-true}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_BUSINESS_ACCOUNT_ID=${WHATSAPP_BUSINESS_ACCOUNT_ID}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
      - WHATSAPP_APP_SECRET=${WHATSAPP_APP_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - unistyles-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ===========================================
  # DIRECTUS - Headless CMS (replaces Strapi)
  # Coolify domain: cms.unistylescuracao.com
  # ===========================================
  directus:
    image: directus/directus:11
    container_name: unistyles-directus
    expose:
      - "8055"
    environment:
      - KEY=${DIRECTUS_KEY}
      - SECRET=${DIRECTUS_SECRET}
      - ADMIN_EMAIL=${DIRECTUS_ADMIN_EMAIL:-admin@unistylescuracao.com}
      - ADMIN_PASSWORD=${DIRECTUS_ADMIN_PASSWORD}
      - PUBLIC_URL=${DIRECTUS_URL:-https://cms.unistylescuracao.com}
      - DB_CLIENT=pg
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=unistyles_db
      - DB_USER=unistyles
      - DB_PASSWORD=${DB_PASSWORD}
      - CACHE_ENABLED=true
      - CACHE_STORE=redis
      - REDIS=redis://:${REDIS_PASSWORD}@redis:6379
      - CORS_ENABLED=true
      - CORS_ORIGIN=${FRONTEND_URL:-https://unistylescuracao.com}
    volumes:
      - directus-uploads:/directus/uploads
      - directus-extensions:/directus/extensions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - unistyles-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8055/server/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  # ===========================================
  # POSTGRES - Main Database (shared by backend + Directus)
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: unistyles-postgres
    environment:
      - POSTGRES_USER=unistyles
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=unistyles_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    networks:
      - unistyles-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unistyles -d unistyles_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # REDIS - Session, Cart Cache, Directus Cache
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: unistyles-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - unistyles-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ===========================================
# NETWORKS
# ===========================================
networks:
  unistyles-network:
    driver: bridge

# ===========================================
# VOLUMES
# ===========================================
volumes:
  postgres-data:
  redis-data:
  directus-uploads:
  directus-extensions:
