# ===========================================
# UNISTYLES E-COMMERCE - Docker Compose
# Full Stack: React + Node.js + Strapi + PostgreSQL + Redis
# Updated: Includes AuthContext, Cart API, Profile page
# ===========================================

services:
  # ===========================================
  # FRONTEND - React App (Vite + Nginx)
  # Includes: AuthContext, ProtectedRoute, Profile,
  #           CartService, updated Home/Checkout/Login
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Use relative URLs - nginx proxies to backend/strapi containers
        - VITE_USE_STRAPI=true
        - VITE_STRAPI_URL=
        - VITE_API_URL=
        - BUILDKIT_INLINE_CACHE=1
    container_name: unistyles-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      strapi:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - unistyles-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ===========================================
  # NGINX - Reverse Proxy & SSL (Production)
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: unistyles-nginx
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
      - strapi
    restart: unless-stopped
    networks:
      - unistyles-network
    profiles:
      - production

  # ===========================================
  # BACKEND - Node.js API Server
  # Includes: Cart merge endpoint, Auth routes
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: unistyles-backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://unistyles:${DB_PASSWORD}@postgres:5432/unistyles_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - WHATSAPP_NUMBER=${WHATSAPP_NUMBER}
      - SENTOO_API_KEY=${SENTOO_API_KEY}
      - SENTOO_MERCHANT_ID=${SENTOO_MERCHANT_ID}
      - SENTOO_SANDBOX=${SENTOO_SANDBOX:-true}
      - SITE_URL=${SITE_URL:-https://unistylescuracao.com}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_BUSINESS_ACCOUNT_ID=${WHATSAPP_BUSINESS_ACCOUNT_ID}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
      - WHATSAPP_APP_SECRET=${WHATSAPP_APP_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - unistyles-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ===========================================
  # POSTGRES - Main Database
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: unistyles-postgres
    environment:
      - POSTGRES_USER=unistyles
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=unistyles_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    networks:
      - unistyles-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unistyles -d unistyles_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # REDIS - Session & Cart Cache Storage
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: unistyles-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - unistyles-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # STRAPI - Content Management System
  # ===========================================
  # Init container to fix upload volume permissions (runs once, then exits)
  strapi-init:
    image: busybox
    container_name: unistyles-strapi-init
    volumes:
      - strapi-uploads:/uploads
    command: sh -c "chown -R 1001:1001 /uploads"
    restart: "no"

  strapi:
    build:
      context: ./strapi
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: unistyles-strapi
    ports:
      - "1337:1337"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=1337
      - PUBLIC_URL=${STRAPI_PUBLIC_URL:-http://localhost:1337}
      - DATABASE_CLIENT=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=unistyles_db
      - DATABASE_USERNAME=unistyles
      - DATABASE_PASSWORD=${DB_PASSWORD}
      - DATABASE_SSL=false
      - APP_KEYS=${STRAPI_APP_KEYS}
      - API_TOKEN_SALT=${STRAPI_API_TOKEN_SALT}
      - ADMIN_JWT_SECRET=${STRAPI_ADMIN_JWT_SECRET}
      - TRANSFER_TOKEN_SALT=${STRAPI_TRANSFER_TOKEN_SALT}
      - JWT_SECRET=${STRAPI_JWT_SECRET}
      - STRAPI_ADMIN_PASSWORD=${STRAPI_ADMIN_PASSWORD:-Admin123!}
      - STRAPI_ADMIN_EMAIL=${STRAPI_ADMIN_EMAIL:-admin@unistylescuracao.com}
      # Set FORCE_RESEED=1 to wipe and reseed all products on next start
      - FORCE_RESEED=${FORCE_RESEED:-0}
    volumes:
      - strapi-uploads:/app/public/uploads
      - ./frontend/public/images:/app/legacy-images:ro
      - ./frontend/public:/app/legacy-public:ro
    depends_on:
      postgres:
        condition: service_healthy
      strapi-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - unistyles-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:1337/_health"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 5

  # ===========================================
  # ADMINER - Database Management (Dev Only)
  # ===========================================
  adminer:
    image: adminer
    container_name: unistyles-adminer
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - unistyles-network
    profiles:
      - dev

# ===========================================
# NETWORKS
# ===========================================
networks:
  unistyles-network:
    driver: bridge

# ===========================================
# VOLUMES
# ===========================================
volumes:
  postgres-data:
  redis-data:
  strapi-uploads:
