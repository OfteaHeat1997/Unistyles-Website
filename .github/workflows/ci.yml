name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ===========================================
  # BACKEND — Lint & Test
  # ===========================================
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: unistyles
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: unistyles_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Initialize database
        run: psql -f ../database/init.sql
        env:
          PGHOST: localhost
          PGUSER: unistyles
          PGPASSWORD: testpass
          PGDATABASE: unistyles_test

      - name: Run migrations
        run: |
          for f in ../database/migrations/*.sql; do
            [ -f "$f" ] && psql -f "$f"
          done
        env:
          PGHOST: localhost
          PGUSER: unistyles
          PGPASSWORD: testpass
          PGDATABASE: unistyles_test

      - name: Health check
        run: |
          timeout 10 node -e "
            const app = require('./src/index');
          " &
          sleep 3
          curl -f http://localhost:3000/health || exit 1
          kill %1 2>/dev/null || true
        env:
          DATABASE_URL: postgresql://unistyles:testpass@localhost:5432/unistyles_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-key-at-least-32-chars
          NODE_ENV: test
          PORT: 3000

  # ===========================================
  # FRONTEND — Lint & Build
  # ===========================================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_USE_STRAPI: 'false'
          VITE_API_URL: ''

  # ===========================================
  # DOCKER — Build & Validate
  # ===========================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t unistyles-backend ./backend

      - name: Build frontend image
        run: docker build -t unistyles-frontend ./frontend
        env:
          VITE_USE_STRAPI: 'false'
