# ===========================================
# UNISTYLES - Development Docker Compose Override
# Use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ===========================================

services:
  # ===========================================
  # FRONTEND - Development with hot reload
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.js:/app/vite.config.js:ro
    environment:
      - VITE_USE_STRAPI=true
      - VITE_STRAPI_URL=http://localhost:1337
      - VITE_API_URL=http://localhost:3000
      - BACKEND_URL=http://backend:3000
      - STRAPI_URL=http://strapi:1337
    ports:
      - "5173:5173"
    command: npm run dev -- --host

  # ===========================================
  # BACKEND - Development with nodemon
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend/src:/app/src:ro
    environment:
      - NODE_ENV=development
    command: npm run dev

  # ===========================================
  # STRAPI - Development mode
  # ===========================================
  strapi:
    environment:
      - NODE_ENV=development
    volumes:
      - ./strapi/src:/app/src
      - ./strapi/config:/app/config
    command: npm run develop

  # ===========================================
  # Enable Adminer for dev
  # ===========================================
  adminer:
    profiles: []  # Override production profile to always run in dev
